name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  names:
    runs-on: ubuntu-latest
    outputs:
      runtime-image: ${{ steps.names.outputs.runtime-image }}
    steps:
      - id: names
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}-runtime"
          echo "runtime-image=$image" >> "$GITHUB_OUTPUT"

  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - run: node --version
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  runtime-image:
    runs-on: ubuntu-latest
    needs: names
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ needs.names.outputs.runtime-image }}:${{ github.ref_name }}
            ${{ needs.names.outputs.runtime-image }}:latest
