version: 2

project_name: cargo-scanner

before:
  hooks:
    - go mod tidy

builds:
  - id: cargo-scanner
    main: ./cmd/cargo-scanner
    binary: cargo-scanner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"
